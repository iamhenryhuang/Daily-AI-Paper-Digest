name: Daily AI Paper Digest

on:
  schedule:
    # 07:00 Asia/Taipei
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-papers:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1-mini
      ARXIV_CATEGORIES: cs.AI,cs.CL,cs.LG,cs.CV,cs.MA,cs.IR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore paper text cache
        uses: actions/cache@v4
        with:
          path: .cache/papers
          key: paper-text-${{ runner.os }}-${{ hashFiles('docs/manifest.json') }}
          restore-keys: |
            paper-text-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve report date
        id: report-date
        run: echo "date=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate digest
        run: >
          python scripts/daily_papers.py
          --date "${{ steps.report-date.outputs.date }}"
          --focus-count 5
          --also-count 3
          --arxiv-results 120

      - name: Update site manifest
        run: python scripts/update_manifest.py

      - name: Commit report
        run: |
          git add docs
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: add daily AI paper digest"
          git push

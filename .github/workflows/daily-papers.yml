name: Daily AI Paper Digest

on:
  schedule:
    # 07:00 Asia/Taipei
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-papers:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      OPENAI_MODEL: gpt-4o
      ARXIV_CATEGORIES: cs.AI,cs.CL,cs.LG,cs.CV,cs.MA,cs.IR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve report date
        id: report-date
        run: echo "date=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate digest
        run: >
          python scripts/daily_papers.py
          --date "${{ steps.report-date.outputs.date }}"
          --focus-count 5
          --also-count 12
          --arxiv-results 120

      - name: Commit report
        run: |
          git add reports/*.md sources/*.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: add daily AI paper digest"
          git push

      - name: Notify Discord
        env:
          REPORT_DATE: ${{ steps.report-date.outputs.date }}
        run: python scripts/notify_discord.py

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Digest</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="masthead">
      <div class="brand">
        <span class="eyebrow">Daily Research Notes</span>
        <a class="home-link" href="index.html" aria-label="回到主頁">
          <h1>Paper Digest</h1>
        </a>
        <p>每日 AI 論文重點、來源清單與快速檢索。</p>
      </div>
      <nav class="masthead-actions" aria-label="外部連結">
        <a class="repo-link" href="https://github.com/iamhenryhuang/Daily-AI-Paper-Digest" aria-label="GitHub repository">
          <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.49 0-.24-.01-1.05-.01-1.9-2.78.62-3.37-1.22-3.37-1.22-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.98c.85 0 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.8 0 .27.18.59.69.49A10.13 10.13 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"/>
          </svg>
        </a>
      </nav>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-title">Archive</div>
        <label for="dateSelect">選擇日期</label>
        <select id="dateSelect"></select>
        <nav id="dateList" class="date-list" aria-label="日期列表"></nav>
      </aside>

      <section class="reader">
        <div class="reader-toolbar">
          <div>
            <div id="currentDate" class="current-date">載入中</div>
            <div id="statusText" class="status-text">讀取資料中...</div>
          </div>
          <div class="toolbar-actions">
            <label class="search-field" for="searchInput">
              <span>搜尋</span>
              <input id="searchInput" type="search">
            </label>
            <div id="tagFilters" class="tag-filters" aria-label="論文標籤"></div>
            <button id="favoritesToggle" class="favorite-toggle" type="button" aria-pressed="false">收藏</button>
            <div class="tabs" role="tablist" aria-label="內容切換">
              <button id="reportTab" class="tab active" type="button">摘要</button>
              <button id="sourcesTab" class="tab" type="button">來源</button>
            </div>
          </div>
        </div>
        <article id="content" class="markdown"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
